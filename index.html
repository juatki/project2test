<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Cesium OSM Globe</title>

    <script src="https://cesium.com/downloads/cesiumjs/releases/1.111/Build/Cesium/Cesium.js"></script>
    <link href="https://cesium.com/downloads/cesiumjs/releases/1.111/Build/Cesium/Widgets/widgets.css" rel="stylesheet">

    <style>
        html, body {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            font-family: sans-serif;
        }

        /* Header at the top */
        #headerText {
            width: 100%;
            text-align: center;
            font-size: 2em;
            font-weight: bold;
            color: rgb(255, 0, 0); 
            position: absolute;
            top: 20px;
            z-index: 10; 
        }

        /* Clues / prompts banner */
        #countryChallenge {
            width: 100%;
            text-align: center;
            font-size: 1.5em;
            font-weight: bold;
            background-color: white;
            padding: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
            position: absolute;
            top: 70px;
            z-index: 10;
        }

        /* Additional info (optional) */
        #countryInfo {
            width: 100%;
            text-align: center;
            font-size: 1.2em;
            margin-top: 5px;
            position: absolute;
            top: 120px;
            z-index: 10;
        }

        /* Cesium globe container */
        #cesiumContainer {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 90%; 
        }
    </style>
</head>
<body>
    <div id="headerText">Guess The Country!</div>

    <!-- Game clue banner -->
    <div id="countryChallenge">Loading clue...</div>

    <!-- Cesium globe -->
    <div id="cesiumContainer"></div>

    <!-- Your JS -->
    <script src="main.js"></script>
</body>
</html>
